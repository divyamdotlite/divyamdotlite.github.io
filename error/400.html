<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF512F">
    <title>Error 400 - Bad Request</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=flood" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: white;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            padding: 50px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .error-container h1 {
            font-size: 4rem;
            color: rgb(255, 80, 80);
            text-shadow: 1px 1px 20px rgba(255, 100, 100, 0.9);
            margin-bottom: 10px;
        }

        .error-container p {
            font-size: 1.5rem;
            margin: 10px 0 20px;
        }

        .error-container a {
            color: greenyellow;
        }

        .material-symbols-outlined {
            font-size: 5vw;
          font-variation-settings:
          'FILL' 1,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }

        @media (max-width: 768px) {
            .error-container {
            box-shadow: none;
        }
    
    }

    </style>
</head>
<body>
    <div class="error-container">
        <h1>400</h1>
        <p>Oops! The server could not understand your request.</p>
        <a href="/"><span class="material-symbols-outlined">flood</span></a>
    </div>
</body>
</html>
